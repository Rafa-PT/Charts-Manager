<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroCharts</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h2>AeroCharts</h2>
</header>

<div class="container">
  <h1>Select Airport</h1>
  <div class="grid" id="airportGrid"></div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="airportTitle"></h2>
    <button onclick="closePanel()">Close</button>
  </div>

  <div class="panel-content">
    <div class="sidebar" id="tabs"></div>
    <div class="charts" id="chartList"></div>
  </div>
</div>

<div class="viewer" id="viewer">
  <button onclick="closeViewer()">Close</button>
  <iframe id="frame"></iframe>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const airports = {
  LPPT: {
    name: "Lisboa - Aeroporto Humberto Delgado / Portela",
    charts: [
      { type: "GND", name: "Aerodrome Chart", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_01-1_en.pdf", isHTML: false },
      { type: "GND", name: "Taxi Chart", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "SID", name: "RWY02 SID", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "SID", name: "RWY20 SID", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "STAR", name: "RWY02 STAR", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "APP", name: "ILS RWY02", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "APP", name: "RNP RWY20", url: "https://www.orimi.com/pdf-test.pdf" }
    ]
  }
};

const airportGrid = document.getElementById("airportGrid");
const panel = document.getElementById("panel");
const airportTitle = document.getElementById("airportTitle");
const tabs = document.getElementById("tabs");
const chartList = document.getElementById("chartList");

function renderAirports() {
  Object.keys(airports).forEach(code => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${code}</h3><p>${airports[code].name}</p>`;
    div.onclick = () => openAirport(code);
    airportGrid.appendChild(div);
  });
}

function openAirport(code) {
  const airport = airports[code];
  panel.style.display = "flex";
  airportTitle.innerText = `${code} — ${airport.name}`;

  const categories = [...new Set(airport.charts.map(c => c.type))];

  tabs.innerHTML = "";
  chartList.innerHTML = "";

  categories.forEach((cat, index) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (index === 0 ? " active" : "");
    tab.innerText = cat;
    tab.onclick = () => selectTab(cat, tab);
    tabs.appendChild(tab);
  });

  selectTab(categories[0], tabs.children[0]);
}

function selectTab(type, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (el) el.classList.add("active");

  const airportCode = airportTitle.innerText.split(" — ")[0];
  const airport = airports[airportCode];

  chartList.innerHTML = "";

  airport.charts
    .filter(c => c.type === type)
    .forEach(chart => {
      const div = document.createElement("div");
      div.className = "chart-card";
      div.innerHTML = `
        <div class="chart-title">${chart.name}</div>
        <div class="chart-meta">${type} • PDF</div>
      `;
      div.onclick = () => openChart(chart.url);
      chartList.appendChild(div);
    });
}

function openChart(url) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("frame").src = url;
}

window.closeViewer = function() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("frame").src = "";
}

window.closePanel = function() {
  panel.style.display = "none";
}

renderAirports();

});
</script>

</body>
</html>
