<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroCharts</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #111;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #222;
      cursor: pointer;
    }

    .viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
    }

    .viewer iframe {
      flex: 1;
      border: none;
    }

    .viewer button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
    }

    .list {
      margin-top: 20px;
    }

    .list button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #222;
      border: none;
      color: white;
      border-radius: 8px;
      text-align: left;
    }
  </style>
</head>
<body>

<header>
  <h2>AeroCharts</h2>
</header>

<div class="container">
  <h1>Select Airport</h1>

  <div class="grid" id="airportGrid"></div>

  <div id="chartsSection" style="display:none;">
    <h2 id="airportTitle"></h2>
    <div class="list" id="chartsList"></div>
  </div>
</div>

<div class="viewer" id="viewer">
  <button onclick="closeViewer()">Close</button>
  <iframe id="frame"></iframe>
</div>

<script>
const airports = {
  LPPT: {
    name: "Lisbon",
    charts: [
      { type: "Airport", name: "Aerodrome Chart", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_01-1_en.pdf" },
      { type: "Airport", name: "Ground Movement RWY02", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_03-1_en.pdf" },
      { type: "Airport", name: "Ground Movement RWY20", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_03-3_en.pdf" },

      { type: "SID", name: "RWY02 SIDs", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_08-1_en.pdf" },
      { type: "SID", name: "RWY20 SIDs", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_08-3_en.pdf" },
      { type: "SID", name: "RNAV SIDs", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_08-5_en.pdf" },

      { type: "STAR", name: "RWY02 STARs", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_10-1_en.pdf" },
      { type: "STAR", name: "RWY20 STARs", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_10-7_en.pdf" },

      { type: "Approach", name: "ILS RWY02", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_12-1_en.pdf" },
      { type: "Approach", name: "ILS RWY20", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_12-5_en.pdf" },
      { type: "Approach", name: "RNP RWY02", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_12-9_en.pdf" },
      { type: "Approach", name: "RNP RWY20", url: "https://ais.nav.pt/wp-content/uploads/AIS_Files/eAIP_Current/eAIP/graphics/eAIP/LP_AD_2_LPPT_12-11_en.pdf" }
    ]
  }
};

const airportGrid = document.getElementById("airportGrid");
const chartsSection = document.getElementById("chartsSection");
const chartsList = document.getElementById("chartsList");
const airportTitle = document.getElementById("airportTitle");

function renderAirports() {
  airportGrid.innerHTML = "";

  Object.keys(airports).forEach(code => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${code}</h3><p>${airports[code].name}</p>`;
    div.onclick = () => openAirport(code);
    airportGrid.appendChild(div);
  });
}

function openAirport(code) {
  const airport = airports[code];
  chartsSection.style.display = "block";
  airportTitle.innerText = `${code} - ${airport.name}`;
  chartsList.innerHTML = "";

  airport.charts.forEach(chart => {
    const btn = document.createElement("button");
    btn.innerText = `${chart.type} - ${chart.name}`;
    btn.onclick = () => openChart(chart.url);
    chartsList.appendChild(btn);
  });
}

function openChart(url) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("frame").src = url;
}

function closeViewer() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("frame").src = "";
}

renderAirports();
</script>

</body>
</html>
