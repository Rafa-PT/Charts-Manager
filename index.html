<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroCharts</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #1f1f1f;
    }

    header h1 { font-size: 20px; }

    nav a {
      margin-left: 20px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover { color: white; }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #888;
      margin-bottom: 20px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #111;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 12px;
      max-width: 400px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 16px;
      transition: 0.2s;
    }

    .card:hover {
      border-color: #555;
    }

    .preview {
      height: 120px;
      background: #1a1a1a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .card h4 { margin-bottom: 5px; }

    .card p {
      font-size: 13px;
      color: #888;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #1f1f1f;
      color: #666;
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>AeroCharts</h1>
    <nav>
      <a href="#">Browse</a>
      <a href="#">Favorites</a>
      <a href="#">About</a>
    </nav>
  </header>

  <div class="container">
    <section class="hero">
      <h2>Browse Aviation Charts</h2>
      <p>Search airport procedures, SIDs, STARs, and approach charts.</p>

      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search ICAO (e.g. LPPT, EGLL)" />
      </div>
    </section>

    <section>
      <h3 style="margin-top:30px;">Popular Charts</h3>

      <div class="grid" id="chartGrid">
        <!-- Cards inserted by JS -->
      </div>
    </section>
  </div>

  <footer>
    © 2026 AeroCharts — Aviation data explorer
  </footer>

  <script>
    const charts = [
      { code: "LPPT", type: "Approach" },
      { code: "EGLL", type: "SID" },
      { code: "KJFK", type: "STAR" },
      { code: "LFPG", type: "Approach" },
      { code: "EDDF", type: "Taxi" },
      { code: "LEMD", type: "SID" }
    ];

    const grid = document.getElementById("chartGrid");
    const searchInput = document.getElementById("searchInput");

    function renderCharts(filter = "") {
      grid.innerHTML = "";

      charts
        .filter(c => c.code.toLowerCase().includes(filter.toLowerCase()))
        .forEach(chart => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <div class="preview">Chart Preview</div>
            <h4>${chart.code}</h4>
            <p>${chart.type}</p>
          `;

          grid.appendChild(div);
        });
    }

    searchInput.addEventListener("input", (e) => {
      renderCharts(e.target.value);
    });

    renderCharts();
  </script>

</body>
</html>
