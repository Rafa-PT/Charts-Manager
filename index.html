<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroCharts</title>

  <!-- Premium font combo -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e5e7eb;
    }

    header {
      padding: 20px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    header h2 {
      font-weight: 500;
      letter-spacing: 1px;
      color: #93c5fd;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 24px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
      box-shadow: 0 10px 30px rgba(59,130,246,0.2);
    }

    .card h3 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .card p {
      color: #94a3b8;
      font-size: 14px;
    }

    /* PANEL */
    .panel {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #020617, #020617);
      display: none;
      flex-direction: column;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .panel-header h2 {
      font-weight: 500;
    }

    .panel-header button {
      background: rgba(255,255,255,0.05);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      color: #cbd5f5;
      cursor: pointer;
    }

    .panel-content {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: 100%;
    }

    /* SIDEBAR */
    .sidebar {
      border-right: 1px solid rgba(255,255,255,0.05);
      padding: 20px;
    }

    .tab {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      color: #94a3b8;
      transition: 0.2s;
    }

    .tab:hover {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .tab.active {
      background: #3b82f6;
      color: white;
    }

    /* CONTENT */
    .charts {
      padding: 25px;
      overflow-y: auto;
    }

    .chart-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .chart-card:hover {
      border-color: #3b82f6;
      transform: scale(1.01);
    }

    .chart-title {
      font-size: 15px;
      margin-bottom: 4px;
    }

    .chart-meta {
      font-size: 12px;
      color: #64748b;
      font-family: 'JetBrains Mono', monospace;
    }

    /* VIEWER */
    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
    }

    .viewer iframe {
      flex: 1;
      border: none;
    }

    .viewer button {
      padding: 12px;
      background: #ef4444;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h2>AeroCharts</h2>
</header>

<div class="container">
  <h1>Select Airport</h1>
  <div class="grid" id="airportGrid"></div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="airportTitle"></h2>
    <button onclick="closePanel()">Close</button>
  </div>

  <div class="panel-content">
    <div class="sidebar" id="tabs"></div>
    <div class="charts" id="chartList"></div>
  </div>
</div>

<div class="viewer" id="viewer">
  <button onclick="closeViewer()">Close</button>
  <iframe id="frame"></iframe>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const airports = {
  LPPT: {
    name: "Lisbon",
    charts: [
      { type: "GND", name: "Aerodrome Chart", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "GND", name: "Taxi Chart", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "SID", name: "RWY02 SID", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "SID", name: "RWY20 SID", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "STAR", name: "RWY02 STAR", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "APP", name: "ILS RWY02", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "APP", name: "RNP RWY20", url: "https://www.orimi.com/pdf-test.pdf" }
    ]
  }
};

const airportGrid = document.getElementById("airportGrid");
const panel = document.getElementById("panel");
const airportTitle = document.getElementById("airportTitle");
const tabs = document.getElementById("tabs");
const chartList = document.getElementById("chartList");

function renderAirports() {
  Object.keys(airports).forEach(code => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${code}</h3><p>${airports[code].name}</p>`;
    div.onclick = () => openAirport(code);
    airportGrid.appendChild(div);
  });
}

function openAirport(code) {
  const airport = airports[code];
  panel.style.display = "flex";
  airportTitle.innerText = `${code} — ${airport.name}`;

  const categories = [...new Set(airport.charts.map(c => c.type))];

  tabs.innerHTML = "";
  chartList.innerHTML = "";

  categories.forEach((cat, index) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (index === 0 ? " active" : "");
    tab.innerText = cat;
    tab.onclick = () => selectTab(cat, tab);
    tabs.appendChild(tab);
  });

  selectTab(categories[0], tabs.children[0]);
}

function selectTab(type, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (el) el.classList.add("active");

  const airportCode = airportTitle.innerText.split(" — ")[0];
  const airport = airports[airportCode];

  chartList.innerHTML = "";

  airport.charts
    .filter(c => c.type === type)
    .forEach(chart => {
      const div = document.createElement("div");
      div.className = "chart-card";
      div.innerHTML = `
        <div class="chart-title">${chart.name}</div>
        <div class="chart-meta">${type} • PDF</div>
      `;
      div.onclick = () => openChart(chart.url);
      chartList.appendChild(div);
    });
}

function openChart(url) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("frame").src = url;
}

window.closeViewer = function() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("frame").src = "";
}

window.closePanel = function() {
  panel.style.display = "none";
}

renderAirports();

});
</script>

</body>
</html>
