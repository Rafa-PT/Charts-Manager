<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroCharts</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #222;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      border-color: #555;
    }

    /* Airport panel */
    .panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: none;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 16px;
      background: #111;
      border: 1px solid #222;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
    }

    .tab.active {
      background: white;
      color: black;
    }

    .chart-list button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
    }

    .viewer iframe {
      flex: 1;
      border: none;
    }

    .viewer button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <h2>AeroCharts</h2>
</header>

<div class="container">
  <h1>Select Airport</h1>
  <div class="grid" id="airportGrid"></div>
</div>

<!-- Airport Panel -->
<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="airportTitle"></h2>
    <button onclick="closePanel()">Close</button>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="chart-list" id="chartList"></div>
</div>

<!-- Viewer -->
<div class="viewer" id="viewer">
  <button onclick="closeViewer()">Close</button>
  <iframe id="frame"></iframe>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const airports = {
  LPPT: {
    name: "Lisbon",
    charts: [
      { type: "GND", name: "Aerodrome Chart", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "GND", name: "Taxi Chart", url: "https://www.orimi.com/pdf-test.pdf" },

      { type: "SID", name: "RWY02 SID", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "SID", name: "RWY20 SID", url: "https://www.orimi.com/pdf-test.pdf" },

      { type: "STAR", name: "RWY02 STAR", url: "https://www.orimi.com/pdf-test.pdf" },

      { type: "APP", name: "ILS RWY02", url: "https://www.orimi.com/pdf-test.pdf" },
      { type: "APP", name: "RNP RWY20", url: "https://www.orimi.com/pdf-test.pdf" }
    ]
  }
};

const airportGrid = document.getElementById("airportGrid");
const panel = document.getElementById("panel");
const airportTitle = document.getElementById("airportTitle");
const tabs = document.getElementById("tabs");
const chartList = document.getElementById("chartList");

function renderAirports() {
  Object.keys(airports).forEach(code => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${code}</h3><p>${airports[code].name}</p>`;
    div.onclick = () => openAirport(code);
    airportGrid.appendChild(div);
  });
}

function openAirport(code) {
  const airport = airports[code];
  panel.style.display = "flex";
  airportTitle.innerText = `${code} - ${airport.name}`;

  const categories = [...new Set(airport.charts.map(c => c.type))];

  tabs.innerHTML = "";
  chartList.innerHTML = "";

  categories.forEach((cat, index) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (index === 0 ? " active" : "");
    tab.innerText = cat;
    tab.onclick = () => selectTab(cat);
    tabs.appendChild(tab);
  });

  selectTab(categories[0]);
}

function selectTab(type) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  const airportCode = airportTitle.innerText.split(" - ")[0];
  const airport = airports[airportCode];

  chartList.innerHTML = "";

  airport.charts
    .filter(c => c.type === type)
    .forEach(chart => {
      const btn = document.createElement("button");
      btn.innerText = chart.name;
      btn.onclick = () => openChart(chart.url);
      chartList.appendChild(btn);
    });
}

function openChart(url) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("frame").src = url;
}

window.closeViewer = function() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("frame").src = "";
}

window.closePanel = function() {
  panel.style.display = "none";
}

renderAirports();

});
</script>

</body>
</html>
