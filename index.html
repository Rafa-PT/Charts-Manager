<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroCharts ATC - LPPT</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h2>AeroCharts ATC</h2>
</header>

<div class="container">
  <h1>Select Airport</h1>

  <!-- Search -->
  <input id="search" placeholder="Search procedure (e.g. ILS 02, LISBOA)">

  <div class="grid" id="airportGrid"></div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="airportTitle"></h2>
    <button onclick="closePanel()">Close</button>
  </div>

  <div class="runway-bar">
    Active RWY:
    <select id="runwaySelect"></select>
  </div>

  <div class="panel-content">
    <div class="sidebar" id="tabs"></div>
    <div class="charts" id="chartList">
      <div class="radar-map-container">
        <!-- Base map -->
        <iframe
          src="https://www.openstreetmap.org/export/embed.html?bbox=-9.265%2C38.679%2C-9.110%2C38.747&amp;layer=mapnik"
          frameborder="0" scrolling="no"></iframe>

        <!-- Radar grid overlay -->
        <div class="radar-overlay"></div>

        <!-- Ground chart overlay -->
        <div id="chartOverlay"></div>
      </div>
    </div>
  </div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <button onclick="closeViewer()">Close</button>
  <iframe id="frame"></iframe>
</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
